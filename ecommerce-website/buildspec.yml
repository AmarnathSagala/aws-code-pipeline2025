version: 0.2

phases:
  install:
    runtime-versions:
      python: 3.8
    commands:
      - pip install -r requirements.txt
  build:
    commands:
      - echo Build started on `date`
      - echo Building the Docker image...
      - docker build -t ecommerce-website .
  post_build:
    commands:
      - echo Build completed on `date`
      - docker tag ecommerce-website:latest 123456789012.dkr.ecr.us-east-1.amazonaws.com/ecommerce-website:latest
      - docker push 123456789012.dkr.ecr.us-east-1.amazonaws.com/ecommerce-website:latest
artifacts:
  files:
    - '**/*'
